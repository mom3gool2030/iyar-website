<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>عيار العقارية</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#F8F4EE;direction:rtl;min-height:100vh}
:root{--g:#1A3226;--g2:#2A4A38;--gold:#A67B40;--goldL:#C89A5A;--cream:#E8D090;--sand:#F8F4EE;--dark:#1A1A1A;--gray:#888}

/* header */
.hdr{background:linear-gradient(135deg,var(--g),var(--g2));padding:12px 14px 0}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{color:var(--cream);font-size:20px;font-weight:900;line-height:1}
.logo small{display:block;font-size:9px;color:rgba(255,255,255,.4);letter-spacing:1px;font-weight:400}
.login-btns{display:flex;gap:7px}
.btn-login{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.28);color:#fff;border-radius:8px;padding:7px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-owner{background:linear-gradient(135deg,var(--gold),var(--goldL));border:none;color:var(--dark);border-radius:8px;padding:7px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}

/* tabs */
.tabs{display:flex;gap:5px;background:rgba(0,0,0,.2);border-radius:10px 10px 0 0;padding:4px 4px 0}
.tab{flex:1;padding:9px 6px;border:none;border-radius:7px 7px 0 0;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:rgba(255,255,255,.55);transition:.15s}
.tab.on{background:#fff;color:var(--g)}

/* content */
.content{padding:16px 14px;max-width:520px;margin:0 auto}
.section{display:none}.section.on{display:block}

/* card */
.card{background:#fff;border-radius:12px;border:1px solid #E8DCC8;padding:16px 14px;margin-bottom:12px}
.card-title{font-size:17px;font-weight:900;color:var(--g);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--gray);margin-bottom:14px}

/* form */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
label{font-size:11px;color:var(--gray);font-weight:600;display:block;margin-bottom:5px}
input,select{width:100%;background:#fff;border:1.5px solid #DDD5C0;border-radius:9px;padding:11px 13px;font-family:inherit;font-size:13px;color:var(--dark);outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--gold)}
.toggle{display:flex;gap:6px}
.tog{flex:1;padding:10px;border:1.5px solid #DDD;border-radius:8px;background:#fff;color:var(--dark);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.tog.on{background:var(--g);color:#fff;border-color:var(--g)}

/* buttons */
.btn-main{width:100%;padding:13px;background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
.btn-main:disabled{background:#BBB;cursor:default}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--goldL));color:var(--dark)}
.btn-outline{background:#fff;color:var(--g);border:1.5px solid var(--g)}

/* result */
.result{background:#fff;border-radius:12px;border:1.5px solid rgba(166,123,64,.3);padding:18px 16px;text-align:center;margin-bottom:10px}
.result-meta{font-size:11px;color:var(--gray);margin-bottom:6px}
.result-sum{font-size:12px;color:var(--dark);font-weight:600;margin-bottom:10px;line-height:1.6}
.result-price{font-size:32px;font-weight:900;color:var(--g);margin-bottom:4px}
.result-range{font-size:11px;color:var(--gray);margin-bottom:10px}
.verdict{display:inline-block;padding:5px 16px;border-radius:16px;font-size:11px;font-weight:700;margin:3px}
.monthly{background:rgba(26,50,38,.08);color:var(--g);padding:5px 14px;border-radius:16px;font-size:11px;font-weight:700}
.tip-box{background:#FFFBF0;border-radius:10px;border:1px solid rgba(166,123,64,.25);padding:13px 14px;margin-bottom:10px}
.tip-title{font-size:10px;color:var(--gold);font-weight:700;margin-bottom:5px}
.tip-text{font-size:12px;color:var(--dark);line-height:1.75}
.btns2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btns2 button{padding:11px;border-radius:9px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;border:none}

/* finance result */
.fin-result{background:#fff;border-radius:12px;padding:18px 16px;text-align:center;margin-bottom:10px}
.fin-price{font-size:30px;font-weight:900;margin-bottom:4px}
.fin-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.fin-item{border-radius:8px;padding:10px}
.disclaimer{background:#FFF8F0;border-radius:10px;border:1px solid #FFCC8044;padding:13px 14px;margin-bottom:10px}
.disc-title{font-size:10px;color:#E65100;font-weight:700;margin-bottom:5px}
.disc-text{font-size:11px;color:#5A3A1A;line-height:1.8}

/* loading */
.loading{text-align:center;padding:28px;color:var(--gray);font-size:13px}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid #DDD;border-top-color:var(--g);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:8px;vertical-align:middle;margin-left:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:99;display:none;align-items:flex-end}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:22px 18px 36px;width:100%;max-width:520px;margin:0 auto}
.modal-bar{width:38px;height:4px;background:#DDD;border-radius:4px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:800;color:var(--dark);text-align:center;margin-bottom:4px}
.modal-sub{font-size:11px;color:var(--gray);text-align:center;margin-bottom:18px}
.modal-inp{width:100%;background:#F8F4EE;border:1.5px solid #DDD5C0;border-radius:9px;padding:11px 13px;font-family:inherit;font-size:13px;color:var(--dark);outline:none;margin-bottom:10px}
.modal-inp:focus{border-color:var(--gold)}
.modal-link{text-align:center;font-size:11px;color:var(--gray);margin-top:8px}
.modal-link span{color:var(--gold);font-weight:700;cursor:pointer}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">عيار <small>العقارية</small></div>
    <div class="login-btns">
      <button class="btn-login" onclick="openModal('buyer')">🔑 تسجيل الدخول</button>
      <button class="btn-owner" onclick="openModal('owner')">🏠 سجّل كمالك</button>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="switchTab('estimate',this)">📊 مؤشر التقييم</button>
    <button class="tab" onclick="switchTab('finance',this)">🏦 حاسبة التمويل</button>
  </div>
</div>

<div class="content">

  <!-- ══ TAB: مؤشر التقييم ══ -->
  <div id="estimate" class="section on">
    <div style="margin-bottom:12px;margin-top:4px">
      <div class="card-title">مؤشر تقييم الإيجار</div>
      <div class="card-sub">أدخل بيانات العقار واحصل على التقدير الفوري بالذكاء الاصطناعي</div>
    </div>

    <div class="card">
      <div class="grid2">
        <div>
          <label>الحي</label>
          <select id="hood">
            <option>الملقا</option><option>حطين</option><option>الياسمين</option>
            <option>القيروان</option><option>السليمانية</option><option>العليا</option>
            <option>الصحافة</option><option>غرناطة</option><option>النرجس</option>
            <option>الروضة</option><option>التعاون</option><option>طويق</option>
            <option>العريجاء</option><option>شبرا</option><option>الدرعية</option>
          </select>
        </div>
        <div>
          <label>نوع العقار</label>
          <select id="ptype">
            <option>شقة</option><option>فيلا</option><option>دور</option><option>استوديو</option>
          </select>
        </div>
        <div>
          <label>المساحة (م²)</label>
          <input type="number" id="area" placeholder="120">
        </div>
        <div>
          <label>عدد الغرف</label>
          <select id="rooms">
            <option>1</option><option>2</option><option selected>3</option>
            <option>4</option><option>5+</option>
          </select>
        </div>
        <div>
          <label>عمر العقار</label>
          <select id="age">
            <option>جديد</option><option selected>3-7 سنوات</option>
            <option>7-15 سنة</option><option>أكثر من 15</option>
          </select>
        </div>
        <div>
          <label>مفروش؟</label>
          <div class="toggle">
            <button class="tog" id="furn-no" onclick="setFurn(false)">لا</button>
            <button class="tog" id="furn-yes" onclick="setFurn(true)">نعم</button>
          </div>
        </div>
      </div>
      <button class="btn-main" id="est-btn" onclick="doEstimate()">🔍 احصل على التقدير الفوري</button>
    </div>

    <div id="est-result"></div>
  </div>

  <!-- ══ TAB: حاسبة التمويل ══ -->
  <div id="finance" class="section">
    <div style="margin-bottom:12px;margin-top:4px">
      <div class="card-title">حاسبة التمويل العقاري</div>
      <div class="card-sub">احسب قسطك الشهري المتوقع بسهولة</div>
    </div>

    <div class="card">
      <div style="display:flex;gap:7px;margin-bottom:14px" id="purpose-tog">
        <button class="tog on" onclick="setPurpose(this,'شراء سكن')">شراء سكن</button>
        <button class="tog" onclick="setPurpose(this,'استثمار')">استثمار</button>
        <button class="tog" onclick="setPurpose(this,'بناء')">بناء</button>
      </div>
      <div class="grid2">
        <div style="grid-column:span 2">
          <label>قيمة العقار (ر.س)</label>
          <input type="number" id="propVal" placeholder="800,000">
        </div>
        <div>
          <label>الراتب الشهري (ر.س)</label>
          <input type="number" id="salary" placeholder="15,000">
        </div>
        <div>
          <label>مدة التمويل (سنة)</label>
          <select id="years">
            <option>10</option><option>15</option><option selected>20</option>
            <option>25</option><option>30</option>
          </select>
        </div>
      </div>
      <button class="btn-main" onclick="doFinance()">🧮 احسب القسط الشهري</button>
    </div>

    <div id="fin-result"></div>
  </div>

</div>

<!-- MODAL تسجيل الدخول -->
<div class="overlay" id="modal" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-bar"></div>
    <div class="modal-title" id="modal-title">تسجيل الدخول</div>
    <div class="modal-sub" id="modal-sub">تابع تقييماتك وعقاراتك</div>
    <input class="modal-inp" placeholder="البريد الإلكتروني أو الجوال">
    <input class="modal-inp" type="password" placeholder="كلمة المرور">
    <button class="btn-main" id="modal-btn">دخول</button>
    <div class="modal-link">ليس لديك حساب؟ <span>إنشاء حساب جديد</span></div>
  </div>
</div>

<script>
// ── state ──
let furnished = false;
let purpose = "شراء سكن";

function setFurn(v){
  furnished = v;
  document.getElementById('furn-yes').className = 'tog' + (v?' on':'');
  document.getElementById('furn-no').className  = 'tog' + (!v?' on':'');
}
setFurn(false);

function setPurpose(el, val){
  purpose = val;
  document.querySelectorAll('#purpose-tog .tog').forEach(b=>b.className='tog');
  el.className='tog on';
}

function switchTab(id, el){
  document.querySelectorAll('.section').forEach(s=>s.className='section');
  document.querySelectorAll('.tab').forEach(t=>t.className='tab');
  document.getElementById(id).className='section on';
  el.className='tab on';
}

function openModal(type){
  const titles = { buyer:["🔑 تسجيل الدخول","تتبع عمليات البحث والتقييمات"], owner:["🏠 مالك العقار","أضف عقاراتك وأدر إعلاناتك"] };
  document.getElementById('modal-title').textContent = titles[type][0];
  document.getElementById('modal-sub').textContent   = titles[type][1];
  document.getElementById('modal-btn').textContent   = type==='owner'?'دخول كمالك عقار':'تسجيل الدخول';
  document.getElementById('modal').className='overlay show';
}
function closeModal(){ document.getElementById('modal').className='overlay'; }

// ── تقدير الإيجار ──
async function doEstimate(){
  const area = document.getElementById('area').value;
  if(!area){ alert('أدخل المساحة أولاً'); return; }

  const hood  = document.getElementById('hood').value;
  const ptype = document.getElementById('ptype').value;
  const rooms = document.getElementById('rooms').value;
  const age   = document.getElementById('age').value;

  document.getElementById('est-result').innerHTML = `<div class="loading"><span class="spinner"></span> جاري التحليل بالذكاء الاصطناعي...</div>`;

  const prompt = `قيّم هذا العقار في الرياض:
الحي: ${hood} | النوع: ${ptype} | المساحة: ${area}م² | الغرف: ${rooms} | العمر: ${age} | مفروش: ${furnished?'نعم':'لا'}
أجب JSON فقط بدون أي نص إضافي:
{"min":رقم,"max":رقم,"avg":رقم,"summary":"جملة قصيرة","tip":"نصيحة واحدة مفيدة","verdict":"فرصة أو عادل أو مبالغ فيه"}`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST", headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:400,
        messages:[{role:"user",content:prompt}] })
    });
    const d = await res.json();
    const txt = d.content[0].text.replace(/```json|```/g,"").trim();
    const r = JSON.parse(txt);

    const vC={"فرصة":"#2E7D32","عادل":"#1565C0","مبالغ فيه":"#C62828"};
    const vB={"فرصة":"#E8F5E9","عادل":"#E3F2FD","مبالغ فيه":"#FFEBEE"};
    const vI={"فرصة":"🔥","عادل":"✅","مبالغ فيه":"⚠️"};
    const monthly = Math.round(r.avg/12/50)*50;

    document.getElementById('est-result').innerHTML = `
      <div class="result" style="border-color:${vB[r.verdict]||'#EEE'}">
        <div class="result-meta">${ptype} · ${hood} · ${area} م²</div>
        <div class="result-sum">${r.summary}</div>
        <div class="result-price">${r.avg?.toLocaleString('ar-SA')} <span style="font-size:14px">ر.س</span></div>
        <div class="result-range">${r.min?.toLocaleString('ar-SA')} — ${r.max?.toLocaleString('ar-SA')} ر.س / سنة</div>
        <span class="verdict" style="background:${vB[r.verdict]};color:${vC[r.verdict]}">${vI[r.verdict]} ${r.verdict}</span>
        <span class="monthly">شهرياً: ${monthly?.toLocaleString('ar-SA')} ر.س</span>
      </div>
      <div class="tip-box">
        <div class="tip-title">💡 نصيحة الخبير</div>
        <div class="tip-text">${r.tip}</div>
      </div>
      <div class="btns2">
        <button style="background:#fff;color:#1A3226;border:1.5px solid #1A3226" onclick="switchTab('finance',document.querySelectorAll('.tab')[1])">🏦 احسب التمويل</button>
        <button style="background:linear-gradient(135deg,#1A3226,#2A4A38);color:#fff" onclick="openModal('buyer')">📋 سجّل وتابع</button>
      </div>`;
  } catch(e) {
    document.getElementById('est-result').innerHTML = `<div class="tip-box"><div class="tip-title">⚠️ تنبيه</div><div class="tip-text">تعذّر الاتصال بالذكاء الاصطناعي. تأكد من الاتصال وحاول مجدداً.</div></div>`;
  }
}

// ── حاسبة التمويل ──
function doFinance(){
  const pv = Number(document.getElementById('propVal').value);
  const sl = Number(document.getElementById('salary').value);
  const yr = Number(document.getElementById('years').value);
  if(!pv||!sl){ alert('أدخل قيمة العقار والراتب'); return; }

  const rate=0.055, loan=pv*0.9;
  const monthly = Math.round(loan*(rate/12)/(1-Math.pow(1+rate/12,-yr*12)));
  const pct = Math.round(monthly/sl*100);
  const eligible = pct <= 33;
  const down = Math.round(pv*0.1/1000)*1000;

  document.getElementById('fin-result').innerHTML = `
    <div class="fin-result" style="border:1.5px solid ${eligible?'#4CAF5044':'#EF535044'}">
      <div style="font-size:26px;margin-bottom:6px">${eligible?'✅':'⚠️'}</div>
      <div style="font-size:14px;font-weight:800;color:${eligible?'#2E7D32':'#C62828'};margin-bottom:12px">
        ${eligible?'تبدو مؤهلاً للتمويل':'قد تحتاج مراجعة الملف'}
      </div>
      <div style="background:#F8F4EE;border-radius:9px;padding:13px;margin-bottom:12px">
        <div style="font-size:11px;color:#888;margin-bottom:4px">القسط الشهري التقديري</div>
        <div class="fin-price" style="color:#1A3226">${monthly.toLocaleString('ar-SA')} <span style="font-size:13px">ر.س</span></div>
        <div style="font-size:10px;color:#888;margin-top:2px">على مدة ${yr} سنة · تمويل 90%</div>
      </div>
      <div class="fin-grid">
        <div class="fin-item" style="background:rgba(26,50,38,.08)">
          <div style="font-size:9px;color:#888">الدفعة الأولى</div>
          <div style="font-size:14px;font-weight:800;color:#1A3226;margin-top:3px">${down.toLocaleString('ar-SA')} ر.س</div>
        </div>
        <div class="fin-item" style="background:rgba(166,123,64,.12)">
          <div style="font-size:9px;color:#888">نسبة القسط</div>
          <div style="font-size:14px;font-weight:800;color:#A67B40;margin-top:3px">${pct}% من الراتب</div>
        </div>
      </div>
    </div>
    <div class="disclaimer">
      <div class="disc-title">📌 تنبيه مهم</div>
      <div class="disc-text">هذا تقدير مبدئي لأغراض التخطيط فقط بناءً على البيانات المدخلة. <strong>الرقم الفعلي سيتم إخطارك به من الجهة الممولة</strong> بعد مراجعة ملفك الائتماني وتطبيق الشروط البنكية المعتمدة.</div>
    </div>
    <button class="btn-main btn-gold" onclick="openModal('buyer')" style="font-size:12px">📲 تواصل مع جهة التمويل</button>`;
}
</script>
</body>
</html>
